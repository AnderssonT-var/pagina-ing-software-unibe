<!-- Modal secreto: consola de videojuegos con acceso desde el logo -->
<div id="modal-juegos-secreto" class="modal secret-games-modal">
<div class="modal-content secret-games-content" aria-live="polite">
<span class="close" data-modal="modal-juegos-secreto">&times;</span>

<div class="secret-console-fx" aria-hidden="true"></div>
<div class="secret-console-grid" aria-hidden="true"></div>
<div class="secret-console-vignette" aria-hidden="true"></div>

<header class="secret-console-header">
  <p class="secret-bootline" id="secret-bootline">[ BOOT // UNIBE ARCADE CORE ]</p>
  <h2>Sistema Secreto de Juegos</h2>
  <p class="secret-subtitle" id="secret-subtitle">Selecciona una miniatura. El juego se abrira en un modal dedicado.</p>
</header>

<section class="secret-launcher" aria-label="Miniaturas de juegos">
  <button type="button" class="secret-thumb is-active" data-game="mario" aria-label="Abrir FullScreenMario">
    <span class="secret-thumb-tag">JUEGO COMPLETO</span>
    <span class="secret-thumb-title">FullScreenMario</span>
    <span class="secret-thumb-desc">Aventura clasica completa</span>
  </button>

  <button type="button" class="secret-thumb" data-game="firewall" aria-label="Abrir Firewall Defender">
    <span class="secret-thumb-tag">BETA</span>
    <span class="secret-thumb-title">Firewall Defender</span>
    <span class="secret-thumb-desc">Defensa de nodos</span>
  </button>

  <button type="button" class="secret-thumb" data-game="bughunter" aria-label="Abrir Bug Hunter">
    <span class="secret-thumb-tag">BETA</span>
    <span class="secret-thumb-title">Bug Hunter</span>
    <span class="secret-thumb-desc">Caza de errores</span>
  </button>

  <button type="button" class="secret-thumb" data-game="pinball" aria-label="Abrir Pinball XR">
    <span class="secret-thumb-tag">JUEGO COMPLETO</span>
    <span class="secret-thumb-title">Pinball XR</span>
    <span class="secret-thumb-desc">Simulador de pinball con fisica realista</span>
  </button>

  <button type="button" class="secret-thumb" data-game="pacman" aria-label="Abrir Pac-Man">
    <span class="secret-thumb-tag">JUEGO COMPLETO</span>
    <span class="secret-thumb-title">Pac-Man</span>
    <span class="secret-thumb-desc">Clasico arcade con IA de fantasmas</span>
  </button>
</section>

<section class="secret-launcher-hint" aria-label="Ayuda del launcher">
  <p>Tip: FullScreenMario abre en modo juego completo para mayor rendimiento.</p>
</section>

<footer class="secret-footnote">Estado: <span>ONLINE</span> // Nivel de acceso: <span>ALTO</span> // Canal: <span>ARCADE</span></footer>
</div>
</div>

<!-- Modal de juego dedicado: muestra solamente el juego activo -->
<div id="modal-juego-player" class="modal secret-player-modal">
<div class="modal-content secret-player-content">
<span class="close" data-modal="modal-juego-player">&times;</span>
<div class="secret-player-top">
  <h3 id="player-game-title">Juego</h3>
  <span class="secret-pill" id="player-game-status">LISTO</span>
</div>
<div class="secret-player-stage">
  <iframe
    id="player-game-frame"
    class="secret-player-frame"
    title="Juego arcade"
    loading="lazy"
    allow="autoplay; fullscreen"
    referrerpolicy="no-referrer"
    src="about:blank"></iframe>
  <div class="secret-player-overlay" id="player-game-overlay">Inicializando juego...</div>
</div>
</div>
</div>
