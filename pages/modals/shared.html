<!-- Modal compartido: Visor de imagenes con zoom y arrastre -->
<div id="image-viewer-modal" class="modal">
<div class="modal-content image-viewer-content">
<span class="close" data-modal="image-viewer-modal">&times;</span>
<div class="image-toolbar">
<button id="zoom-out" type="button" aria-label="Alejar">-</button>
<button id="zoom-in" type="button" aria-label="Acercar">+</button>
<button id="zoom-reset" type="button" aria-label="Reiniciar zoom">Reset</button>
</div>
<div class="image-stage" id="image-stage">
<img id="image-viewer-img" src="" alt="Vista ampliada" draggable="false">
</div>
</div>
</div>
